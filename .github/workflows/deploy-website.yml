name: Deploy Aron Website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL || vars.FIREBASE_DATABASE_URL }}
      FIREBASE_DB_ROOT: ${{ secrets.FIREBASE_DB_ROOT || vars.FIREBASE_DB_ROOT || secrets.VITE_FIREBASE_DB_ROOT || vars.VITE_FIREBASE_DB_ROOT }}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      FIREBASE_SERVICE_ACCOUNT_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || vars.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || vars.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL || vars.VITE_FIREBASE_DATABASE_URL }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || vars.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || vars.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID || vars.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || vars.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_DB_ROOT: ${{ secrets.VITE_FIREBASE_DB_ROOT || vars.VITE_FIREBASE_DB_ROOT }}
      VITE_DISCORD_PROVIDER_ID: oidc.discord
      VITE_DISCORD_CLIENT_ID: ${{ secrets.VITE_DISCORD_CLIENT_ID || vars.VITE_DISCORD_CLIENT_ID }}
      VITE_DISCORD_REDIRECT_URI: ${{ secrets.VITE_DISCORD_REDIRECT_URI || vars.VITE_DISCORD_REDIRECT_URI }}
      VITE_DISCORD_INVITE_URL: ${{ secrets.VITE_DISCORD_INVITE_URL || vars.VITE_DISCORD_INVITE_URL }}
      VITE_SUPPORT_SERVER_URL: ${{ secrets.VITE_SUPPORT_SERVER_URL || vars.VITE_SUPPORT_SERVER_URL }}
      VITE_TOPGG_URL: ${{ secrets.VITE_TOPGG_URL || vars.VITE_TOPGG_URL }}
      VITE_BASE_PATH: ${{ secrets.VITE_BASE_PATH || vars.VITE_BASE_PATH }}
      VITE_USE_HASH_ROUTER: ${{ secrets.VITE_USE_HASH_ROUTER || vars.VITE_USE_HASH_ROUTER }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json
      - name: Load website .env fallback
        run: |
          if [ -f website/.env ]; then
            while IFS= read -r line || [ -n "$line" ]; do
              line="${line%$'\r'}"
              case "$line" in
                ""|\#*) continue ;;
              esac
              case "$line" in
                *=*) ;;
                *) continue ;;
              esac

              key="${line%%=*}"
              value="${line#*=}"

              if [[ "$key" =~ ^[A-Za-z_][A-Za-z0-9_]*$ ]] && [ -z "${!key}" ]; then
                printf '%s=%s\n' "$key" "$value" >> "$GITHUB_ENV"
                export "$key=$value"
              fi
            done < website/.env
          fi

          if [ -z "$FIREBASE_DATABASE_URL" ] && [ -n "$VITE_FIREBASE_DATABASE_URL" ]; then
            printf 'FIREBASE_DATABASE_URL=%s\n' "$VITE_FIREBASE_DATABASE_URL" >> "$GITHUB_ENV"
            export FIREBASE_DATABASE_URL="$VITE_FIREBASE_DATABASE_URL"
          fi

          if [ -z "$FIREBASE_DB_ROOT" ] && [ -n "$VITE_FIREBASE_DB_ROOT" ]; then
            printf 'FIREBASE_DB_ROOT=%s\n' "$VITE_FIREBASE_DB_ROOT" >> "$GITHUB_ENV"
            export FIREBASE_DB_ROOT="$VITE_FIREBASE_DB_ROOT"
          fi
      - name: Install bot dependencies
        run: |
          if [ ! -f package.json ]; then
            echo "::warning::Root package.json was not found in this checkout, so bot dependency install is being skipped."
          elif [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
      - name: Install website dependencies
        working-directory: website
        run: npm ci
      - name: Check website configuration
        run: |
          missing=0
          for name in FIREBASE_DATABASE_URL VITE_FIREBASE_API_KEY VITE_FIREBASE_DATABASE_URL VITE_FIREBASE_PROJECT_ID VITE_DISCORD_CLIENT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for the website build. Add it as a GitHub Actions secret or repository variable."
              missing=1
            fi
          done
          if [ -f package.json ] && [ -f scripts/export-website-snapshot.js ] && [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ] && [ -z "$FIREBASE_SERVICE_ACCOUNT_BASE64" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT_JSON or FIREBASE_SERVICE_ACCOUNT_BASE64 is required to export the website data snapshot."
            missing=1
          fi
          exit "$missing"
      - name: Export website data snapshot
        run: |
          if [ -f package.json ] && [ -f scripts/export-website-snapshot.js ]; then
            npm run export:website-data
          elif [ -f website/public/data/snapshot.json ]; then
            echo "::warning::Root bot project was not found, so the existing website snapshot will be used."
          else
            echo "::warning::Root bot project and website snapshot were not found. Creating an empty snapshot."
            mkdir -p website/public/data
            printf '{"generatedAt":"%s","stats":{"players":0,"cards":0,"copies":0,"guilds":0},"users":{},"cards":{},"guilds":{},"security":{},"wishlistLeaderboard":{}}\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > website/public/data/snapshot.json
          fi
      - name: Build website
        working-directory: website
        run: npm run build
      - name: Add Pages fallback
        working-directory: website
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
